<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<meta content="Enter City of Influence, the interactive marketing portfolio of Rae-Anne Richardson, Sr. Marketing Strategist." name="description"/>
<meta content="#071321" name="theme-color"/>
<title>Rae-Anne Richardson · City of Influence</title>
<link href="styles.css?v=20260620-19" rel="stylesheet"/>
<link as="image" fetchpriority="high" href="scene-mobile-v2.webp" media="(max-width: 768px)" rel="preload" type="image/webp"/><link as="image" fetchpriority="high" href="scene-desktop-v2.webp" media="(min-width: 769px)" rel="preload" type="image/webp"/></head>
<body class="welcome-page">
<a class="skip-link welcome-skip-link" href="#welcome-content">Skip to entry</a>
<div aria-hidden="true" class="welcome-visual">
<div class="welcome-abstract-field"></div>
<div class="welcome-grid"></div>
<picture class="welcome-picture">
<source media="(max-width: 768px)" srcset="scene-mobile-v2.webp" type="image/webp"/>
<source media="(max-width: 768px)" srcset="scene-mobile-v2.jpg" type="image/jpeg"/>
<source srcset="scene-desktop-v2.webp" type="image/webp"/>
<img alt="" class="welcome-background" decoding="async" fetchpriority="high" src="scene-desktop-v2.jpg"/>
</picture>
<div class="welcome-depth welcome-depth-back"></div>
<div class="welcome-depth welcome-depth-mid"></div>
<div class="welcome-light-sweep"></div>
<div class="welcome-grain"></div>
<div class="welcome-vignette"></div>
<div aria-hidden="true" class="welcome-city-word">CITY OF INFLUENCE</div>
</div>
<main class="welcome-shell" id="welcome-content">
<section aria-labelledby="welcome-title" class="welcome-card">
<p class="welcome-eyebrow">
<span class="welcome-eyebrow-line"></span>
          Interactive Portfolio
        </p>
<h1 class="welcome-name" id="welcome-title">
<span>Rae-Anne</span>
<span>Richardson</span>
</h1>
<p class="welcome-role">Sr. Marketing Strategist</p>
<div aria-hidden="true" class="welcome-rule">
<span></span>
</div>
<p class="welcome-invitation">
          Enter to explore the <strong>City of Influence</strong>.
        </p>
<a class="welcome-enter" href="portfolio.html" id="welcomeEnter">
<span class="welcome-enter-label">Enter the City</span>
<span aria-hidden="true" class="welcome-enter-icon">
<svg role="presentation" viewbox="0 0 24 24">
<path d="M5 12h13M13 6l6 6-6 6"></path>
</svg>
</span>
</a>
<p class="welcome-note">Strategy. Story. Movement.</p>
</section>
</main>
<div aria-hidden="true" class="welcome-coordinate welcome-coordinate-top">
<span>10.6918° N</span>
<span>61.2225° W</span>
</div>
<div aria-hidden="true" class="welcome-coordinate welcome-coordinate-bottom">
<span>Shape</span>
<span>Influence</span>
<span>Impact</span>
</div>
<div aria-hidden="true" class="welcome-transition">
<div class="welcome-transition-core"></div>
</div>
<script>
(() => {
  const page = document.body;
  const enterLink = document.getElementById("welcomeEnter");
  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
  const mobileScene = window.matchMedia("(max-width: 768px)").matches;

  const devicePrefix = mobileScene ? "mobile" : "desktop";
  const portfolioAssets = [
    `${devicePrefix}-plane-cover.webp`,
    `${devicePrefix}-twinkle-1.webp`,
    `${devicePrefix}-twinkle-2.webp`,
    `${devicePrefix}-twinkle-3.webp`,
    `${devicePrefix}-billboard.webp`,
    `${devicePrefix}-portfolio.webp`,
    `${devicePrefix}-bus.webp`,
    `${devicePrefix}-news.webp`,
    `${devicePrefix}-contact.webp`,
    `${devicePrefix}-plane.webp`
  ];

  let assetsWarmed = false;

  function warmPortfolioAssets(priority = "low") {
    if (assetsWarmed) return;
    assetsWarmed = true;

    portfolioAssets.forEach((src) => {
      const image = new Image();
      image.decoding = "async";
      image.fetchPriority = priority;
      image.src = src;
    });

    ["content.js?v=20260620-12", `app.js?v=20260620-19`].forEach((href) => {
      const link = document.createElement("link");
      link.rel = "prefetch";
      link.href = href;
      document.head.appendChild(link);
    });
  }

  function goToPortfolio() {
    window.location.assign("portfolio.html");
  }

  ["pointerenter", "focus", "touchstart"].forEach((eventName) => {
    enterLink.addEventListener(
      eventName,
      () => warmPortfolioAssets("high"),
      { once: true, passive: eventName === "touchstart" }
    );
  });

  window.addEventListener(
    "load",
    () => {
      const warm = () => warmPortfolioAssets("low");
      if ("requestIdleCallback" in window) {
        window.requestIdleCallback(warm, { timeout: 1500 });
      } else {
        window.setTimeout(warm, 500);
      }
    },
    { once: true }
  );

  enterLink.addEventListener("click", (event) => {
    if (reducedMotion.matches) return;

    event.preventDefault();
    if (page.classList.contains("is-entering")) return;

    warmPortfolioAssets("high");
    page.classList.add("is-entering");
    enterLink.setAttribute("aria-disabled", "true");

    // The original transition waited over one second.
    // This keeps the cinematic effect without making the site feel stalled.
    window.setTimeout(goToPortfolio, 560);
  });

  window.addEventListener("pageshow", () => {
    page.classList.remove("is-entering");
    enterLink.removeAttribute("aria-disabled");
  });

  if (!reducedMotion.matches && window.matchMedia("(pointer: fine)").matches) {
    let frame = null;

    window.addEventListener("pointermove", (event) => {
      if (frame) window.cancelAnimationFrame(frame);

      frame = window.requestAnimationFrame(() => {
        const x = (event.clientX / window.innerWidth - 0.5) * 2;
        const y = (event.clientY / window.innerHeight - 0.5) * 2;
        page.style.setProperty("--welcome-pointer-x", x.toFixed(3));
        page.style.setProperty("--welcome-pointer-y", y.toFixed(3));
      });
    });
  }
})();
</script>
</body>
</html>
